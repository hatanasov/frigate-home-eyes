apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.k3s.service: mqtt
  name: mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      io.k3s.service: mqtt
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.k3s.service: mqtt
    spec:
      containers:
        - image: eclipse-mosquitto
          name: mqtt
          ports:
            - containerPort: 1883
              protocol: TCP
          resources:
            limits:
              cpu: "128m"
              memory: "64Mi"
          volumeMounts:
            - mountPath: /mosquitto/config/mosquitto.conf
              name: mqtt-cm0
              subPath: mosquitto.conf
            - mountPath: /mosquitto/config/password.txt
              name: mqtt-cm1
              subPath: password.txt
      volumes:
        - configMap:
            items:
              - key: mosquitto.conf
                path: mosquitto.conf
            name: mqtt-cm0
          name: mqtt-cm0
        - configMap:
            items:
              - key: password.txt
                path: password.txt
            name: mqtt-cm1
          name: mqtt-cm1
